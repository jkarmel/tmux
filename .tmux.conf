setw -g mode-keys vi
set -g renumber-windows on

# ── Prefix key ───────────────────────────────────────────────────
unbind C-b
set -g prefix M-b
bind M-b send-prefix

# ── Status bar styling (powerline) ────────────────────────────────
set -g status-style 'bg=colour235,fg=colour250'
set -g status-left-length 40
set -g status-right-length 120
set -g status-interval 3
set -g window-status-separator ''

# Left: session name + prefix indicator (orange flash when pressed)
set -g status-left '#[bg=colour75 fg=colour235 bold] #S #[bg=colour235 fg=colour75]#{?client_prefix,#[bg=colour208 fg=colour235 bold] ^ #[bg=colour235 fg=colour208],}'

# Right: AI agent counts (only appears when agents exist)
set -g status-right '#{?@ai_status_line,#[fg=colour33]#[bg=colour33 fg=colour255 bold] #{@ai_status_line} ,}'

# ── AI window activity highlighting ───────────────────────────────
# Background monitor polls AI windows every 3s, sets per-window
# @ai_status and global @ai_status_line for the status bar
run-shell -b '~/.tmux/scripts/ai-monitor.sh'

# Only show current window in status bar
set -g window-status-format ''
set -g window-status-current-format '#[bg=colour33 fg=colour255 bold] #I:#W #[bg=colour235 fg=colour33]'

# prefix+w: choose-tree with AI window highlighting
bind-key w choose-tree -w -F '#{?#{||:#{m:*(claude)*,#{window_name}},#{m:*(codex)*,#{window_name}}},#{?#{==:#{@ai_status},active},⚡ #{window_name},#{?#{==:#{@ai_status},done},✅ #{window_name},🤖 #{window_name}}},#{window_name}}'

# prefix + A → unified AI agent launcher popup
bind-key A display-popup -E -w 60% -h 60% "~/.tmux/scripts/ai-popup"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'b0o/tmux-autoreload'
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'roosta/tmux-fuzzback'
set -g @plugin 'fiqryq/port'
set -g @treemux-tree-nvim-init-file '~/.tmux/plugins/treemux/configs/treemux_init.lua'
set -g @plugin 'kiyoon/treemux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect: save/restore pane contents and processes
set -g @resurrect-capture-pane-contents 'on'

# Continuum: auto-save every 15 min, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# prefix + t → nvim-tree file explorer in a new window
bind-key t run-shell 'tmux new-window -c "#{pane_current_path}" "nvim -u ~/.tmux/plugins/treemux/configs/treemux_init.lua \"+lua require(\\\"nvim-tree.api\\\").tree.open({current_window = true})\" #{pane_current_path}"'
run-shell ~/.tmux/plugins/tmux-summarize/summarize.tmux
run-shell ~/.tmux/plugins/tmux-reorder/reorder.tmux

# prefix + f → fuzzy switch window directly
bind-key f display-popup -E "tmux list-windows -a -F '#S:#I: #{window_name}' | grep -v \"^$(tmux display-message -p '#S:#I:')\" | fzf --reverse --header='Switch window' | sed 's/: .*//' | xargs -I{} sh -c 'tmux select-window -t {} && tmux switch-client -t {}'"

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'

# ── Option-key shortcuts (no prefix) ─────────────────────────────
# These must come AFTER TPM to avoid being overridden by plugins
# Option+j/k: next/previous window
bind-key -n M-j next-window
bind-key -n M-k previous-window
# Option+a: AI session picker → agent launcher popup
bind-key -n M-a display-popup -E -w 80% -h 80% "~/.tmux/scripts/ai-session-launch"
# Option+]/[ : next/previous session
bind-key -n M-] switch-client -n
bind-key -n M-[ switch-client -p
# Option+7: kill current window (with confirmation)
bind-key -n M-7 confirm-before -p "Kill window #W? (y/n)" kill-window
# Option+u: enter scroll (copy) mode
bind-key -n M-u copy-mode
# Option+e: custom window manager with tree view and preview
bind-key -n M-e display-popup -E -w 80% -h 80% "~/.tmux/scripts/window-manager"
# Option+w: session-focused window browser (h/l cycles sessions)
bind-key -n M-w display-popup -E -w 80% -h 80% "~/.tmux/scripts/window-manager --session"
# Option+s: session list browser
bind-key -n M-s display-popup -E -w 80% -h 80% "~/.tmux/scripts/window-manager --sessions"
# Option+q: summarize pane with Opus 4.6 + interactive Q&A
# (bound by tmux-summarize plugin, listed here for reference)
# Option+r: AI windows only (robots view)
bind-key -n M-r display-popup -E -w 80% -h 80% "~/.tmux/scripts/window-manager --robots"
# In copy-mode: Option+u/d for half-page up/down
bind-key -T copy-mode-vi M-u send-keys -X halfpage-up
bind-key -T copy-mode-vi M-d send-keys -X halfpage-down
