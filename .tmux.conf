setw -g mode-keys vi
set -g renumber-windows on

# ── Status bar styling (powerline) ────────────────────────────────
set -g status-style 'bg=colour235,fg=colour250'
set -g status-left-length 40
set -g status-right-length 120
set -g status-interval 3
set -g window-status-separator ''

# Left: prefix indicator only (orange flash when pressed)
set -g status-left '#{?client_prefix,#[bg=colour208 fg=colour235 bold] ^ #[bg=colour235 fg=colour208],}'

# Right: AI agent counts (only appears when agents exist)
set -g status-right '#{?@ai_status_line,#[fg=colour33]#[bg=colour33 fg=colour255 bold] #{@ai_status_line} ,}'

# ── AI window activity highlighting ───────────────────────────────
# Background monitor polls AI windows every 3s, sets per-window
# @ai_status and global @ai_status_line for the status bar
run-shell -b '~/.tmux/scripts/ai-monitor.sh'

# Only show current window in status bar
set -g window-status-format ''
set -g window-status-current-format '#[bg=colour33 fg=colour255 bold] #I:#W #[bg=colour235 fg=colour33]'

# prefix+w: choose-tree with AI window highlighting
bind-key w choose-tree -w -F '#{?#{||:#{m:*(claude)*,#{window_name}},#{m:*(codex)*,#{window_name}}},#{?#{==:#{@ai_status},active},⚡ #{window_name},#{?#{==:#{@ai_status},done},✅ #{window_name},🤖 #{window_name}}},#{window_name}}'

# prefix + A → unified AI agent launcher popup
bind-key A display-popup -E -w 60% -h 60% "~/.tmux/scripts/ai-popup"

# ── Option-key shortcuts (no prefix) ─────────────────────────────
# Option+w: choose-tree with AI window highlighting
bind-key -n M-w choose-tree -w -F '#{?#{||:#{m:*(claude)*,#{window_name}},#{m:*(codex)*,#{window_name}}},#{?#{==:#{@ai_status},active},⚡ #{window_name},#{?#{==:#{@ai_status},done},✅ #{window_name},🤖 #{window_name}}},#{window_name}}'
# Option+j/k: next/previous window
bind-key -n M-j next-window
bind-key -n M-k previous-window
# Option+a: AI agent launcher
bind-key -n M-a run-shell '~/.tmux/scripts/ai-launch'
# Option+7: kill current window
bind-key -n M-7 kill-window

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'b0o/tmux-autoreload'
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'roosta/tmux-fuzzback'
set -g @plugin 'fiqryq/port'
run-shell ~/.tmux/plugins/tmux-summarize/summarize.tmux
run-shell ~/.tmux/plugins/tmux-reorder/reorder.tmux

# prefix + f → fuzzy switch window directly
bind-key f display-popup -E "tmux list-windows -a -F '#S:#I: #{window_name}' | grep -v \"^$(tmux display-message -p '#S:#I:')\" | fzf --reverse --header='Switch window' | sed 's/: .*//' | xargs -I{} sh -c 'tmux select-window -t {} && tmux switch-client -t {}'"

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
