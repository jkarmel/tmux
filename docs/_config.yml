title: tmux AI Command Center
description: A tmux configuration for managing AI coding agents with worktree isolation, live monitoring, and interactive workflows.
remote_theme: just-the-docs/just-the-docs@v0.10.1
color_scheme: dark

plugins:
  - jekyll-remote-theme

# GitHub Pages source
url: "https://jkarmel.github.io"
baseurl: "/tmux"

# Exclude non-docs files from the build
exclude:
  - scripts/
  - plugins/
  - .tmux.conf
  - .env
  - .gitignore
  - FEATURES.md
  - capture-screenshots.py
